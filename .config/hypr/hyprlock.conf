source = ~/.config/omarchy/current/theme/hyprlock.conf

$panel_color = rgba(17, 19, 29, 0.72)
$panel_border = rgba(122, 162, 247, 0.55)
$muted_color = rgba(169, 177, 214, 0.65)
$danger_color = rgba(247, 118, 142, 1.0)

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    text_trim = true
}

background {
    monitor =
    path = screenshot
    color = $color
    blur_passes = 4
    blur_size = 6
    noise = 0.015
    contrast = 0.95
    brightness = 0.78
    vibrancy = 0.18
    vibrancy_darkness = 0.2
}

animations {
    enabled = true

    bezier = smoothOut, 0.22, 1, 0.36, 1
    bezier = smoothInOut, 0.45, 0, 0.15, 1

    animation = fade, 1, 3.2, smoothOut
    animation = inputFieldWidth, 1, 2.5, smoothInOut
    animation = inputFieldFade, 1, 2.0, smoothOut
    animation = inputFieldColors, 1, 3.0, smoothOut
}

shape {
    monitor =
    size = 760, 400
    position = 0, 0
    halign = center
    valign = center
    color = $panel_color
    rounding = 24
    border_size = 2
    border_color = $panel_border
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.35)
}

label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, -82
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor =
    text = cmd[update:1000] date '+%A, %d %B %Y'
    color = $muted_color
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:0] printf '%s@%s' "$USER" "$(hostname)"
    color = $check_color
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 520, 72
    position = 0, 96
    halign = center
    valign = center

    outline_thickness = 2
    inner_color = rgba(26, 27, 38, 0.82)
    outer_color = $outer_color
    check_color = $check_color
    fail_color = $danger_color
    capslock_color = rgba(255, 203, 107, 1.0)
    numlock_color = rgba(125, 207, 255, 1.0)

    font_color = $font_color
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##7aa2f7">Enter Password 󰈷</span></i>
    fail_text = <i><span foreground="##f7768e">$FAIL ($ATTEMPTS)</span></i>
    check_text = <i>Checking...</i>

    hide_input = false
    fade_on_empty = false
    rounding = 18
    shadow_passes = 2
    shadow_size = 3
    dots_center = true
    dots_spacing = 0.22
    dots_size = 0.18
}

label {
    monitor =
    text = Layout: $LAYOUT[!,TH]
    color = $muted_color
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 154
    halign = center
    valign = center
}

label {
    monitor =
    text = <span allow_breaks="true">Touch <b>fingerprint</b> or press <b>Enter</b></span>
    color = $muted_color
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 182
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = true
}
