# Personal Hyprland look and animation overrides

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
}

decoration {
    rounding = 10
    dim_inactive = true
    dim_strength = 0.12
    active_opacity = 1.0
    inactive_opacity = 0.96

    shadow {
        enabled = true
        range = 10
        render_power = 3
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        brightness = 0.85
        contrast = 1.0
    }
}

animations {
    enabled = yes

    bezier = smoothOut, 0.22, 1, 0.36, 1
    bezier = smoothIn, 0.12, 0, 0.39, 0
    bezier = smoothInOut, 0.45, 0, 0.15, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = border, 1, 7, quick
    animation = windows, 1, 4, smoothInOut
    animation = windowsIn, 1, 4.5, smoothOut, popin 82%
    animation = windowsOut, 1, 2.8, smoothIn, popin 82%
    animation = fade, 1, 3, quick
    animation = layers, 1, 4, smoothOut
    animation = layersIn, 1, 4.2, smoothOut, fade
    animation = layersOut, 1, 2.5, smoothIn, fade
    animation = fadeLayersIn, 1, 2, quick
    animation = fadeLayersOut, 1, 1.6, quick
    animation = workspaces, 1, 3.6, smoothInOut
    animation = specialWorkspace, 1, 4, smoothOut, slidevert
}

layout {
    single_window_aspect_ratio = 1.5 1
}

scrolling {
    column_width = 0.52
}
